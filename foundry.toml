[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.28"
evm_version = "cancun"
via_ir = true
optimizer = true
optimizer_runs = 200

remappings = [
  "@grunt/=lib/grunt/src/",
  "@vault-v2/=lib/vault-v2/src/",
  "solady/=lib/grunt/lib/solady/src/",
  # Grunt source imports use literal "lib/solady/..." and "lib/morpho-blue/..." paths.
  # Shadow them to grunt's transitive submodule locations so grunt compiles from here.
  "lib/solady/=lib/grunt/lib/solady/",
  "lib/morpho-blue/=lib/grunt/lib/morpho-blue/",
  "forge-std/=lib/forge-std/src/",
]

[fmt]
tab_width = 2

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
